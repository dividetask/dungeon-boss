bosses:
  - id: boss_lich
    name: Lich
    lead_damage: 4
    bait:
      undead: 1
      arcane: 1
    effect:
      room_bonuses:
        - match: { type: trap, tag: arcane }
          per_point: 1
    ability_text: "Arcane Trap rooms deal +1 damage per point."

  - id: boss_oni
    name: Oni
    lead_damage: 8
    bait:
      glory: 1
      arcane: 1
    effect:
      room_bonuses:
        - match: { tag: monstrous_humanoid }
          flat: 4
    tags: [monstrous_humanoid]
    ability_text: "All Monstrous Humanoid rooms deal +4 damage."

  - id: boss_vampire
    name: Vampire
    lead_damage: 4
    bait:
      undead: 1
      riches: 1
    effect:
      self_damage_per_point: 2
    ability_text: "Deals an additional 2 damage per point, rather than 1."

  - id: boss_medusa
    name: Medusa
    lead_damage: 6
    bait:
      glory: 1
      arcane: 1
    effect:
      unreducible: true
    ability_text: "Medusa's petrifying gaze cannot be reduced — her damage ignores every hero and party reduction."

  - id: boss_goblin_chieftain
    name: Goblin Chieftain
    lead_damage: 4
    bait:
      glory: 1
      riches: 1
    effect:
      room_bonuses:
        - match: { tag: goblin }
          per_point: 1
        - match: { tag: hobgoblin }
          per_point: 1
    tags: [goblin]
    ability_text: "Goblin and Hobgoblin rooms deal +1 damage per point."

  - id: boss_malevolent_spirit
    name: Malevolent Spirit
    lead_damage: 2
    bait:
      undead: 1
      arcane: 1
      glory: 1
    effect:
      self_damage_per_point: 3
    ability_text: "Deals an additional 3 damage per point, rather than 1."

  - id: boss_kobold_chieftain
    name: Kobold Chieftain
    lead_damage: 5
    bait:
      riches: 1
      glory: 1
    effect:
      room_bonuses:
        - match: { type: trap }
          flat: 2
    ability_text: "All trap rooms in this dungeon deal an additional 2 damage."

  - id: boss_necromancer
    name: Necromancer
    lead_damage: 4
    bait:
      undead: 1
      arcane: 1
    effect:
      room_bonuses:
        - match: { type: creature, tag: undead }
          flat: 2
    ability_text: "All undead creatures in this dungeon deal an additional 2 damage."

