# Heroes — wandering adventurers lured into dungeons.
#
# The hero's mechanical behaviour is fully data-driven (no per-id code). The
# derived stats use (level - 1), so a level-1 hero has its base stats:
#   max HP        = starting_hp + floor((level - 1) * hp_level_increment)
#   courage       = starting_courage + (level - 1)      (per-class base; +1 per level)
#   party reduce  = party_damage_reduction + floor((level - 1) * party_damage_reduction_level_increment)
# A hero's level starts at floor(round / 4) + 1 when it arrives (minimum 1, never
# 0), gains +1 each time it survives a crawl, and persists until the hero dies.
# See docs/cards.md and docs/phases.md. Bait types: glory, riches, undead, arcane.
heroes:
  - id: hero_barbarian
    name: Barbarian
    icon: "🪓"
    preferred_bait: glory
    starting_hp: 8
    starting_courage: 2
    hp_level_increment: 2
    self_damage_multiplier: 0.5
    party_damage_reduction: 0
    party_damage_reduction_level_increment: 0
    damage_bait_filter: null
    damage_room_type_filter: null
    copies: 12

  - id: hero_rogue
    name: Rogue
    icon: "🗡️"
    preferred_bait: riches
    starting_hp: 6
    starting_courage: 1
    hp_level_increment: 1
    self_damage_multiplier: 1
    party_damage_reduction: 2
    party_damage_reduction_level_increment: 1
    damage_bait_filter: null
    damage_room_type_filter: trap
    copies: 12

  - id: hero_cleric
    name: Cleric
    icon: "✝️"
    preferred_bait: undead
    starting_hp: 5
    starting_courage: 2
    hp_level_increment: 0.75
    self_damage_multiplier: 1
    party_damage_reduction: 4
    party_damage_reduction_level_increment: 1
    damage_bait_filter: undead
    damage_room_type_filter: null
    copies: 12

  - id: hero_mage
    name: Mage
    icon: "🔮"
    preferred_bait: arcane
    starting_hp: 4
    starting_courage: 1
    hp_level_increment: 0.05
    self_damage_multiplier: 1
    party_damage_reduction: 4
    party_damage_reduction_level_increment: 2
    damage_bait_filter: arcane
    damage_room_type_filter: null
    copies: 12
