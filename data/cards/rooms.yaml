# Room cards — flat field schema (v2).
#
# This replaces the old nested `effect:` block. Both clients read these fields
# directly. Bait keys are the canonical four: glory, riches, undead, arcane.
#
# Required fields:
#   name                     display name
#   type                     trap | monster
#   advanced                 false (basic) | true (advanced room)
#   bait                     map of bait type => icon count
#   lead_damage              damage to the highest-HP hero; on a kill the
#                            leftover cascades to the next-highest hero
#   lead_damage_increment    float; extra lead damage per room LEVEL
#
# Optional fields (omit = absent / 0 / null):
#   damage_all               damage dealt to every hero
#   damage_all_increment     float; extra all-damage per room level
#   damage_rear              damage to the lowest-HP hero (cascades upward)
#   damage_rear_increment    float; extra rear damage per room level
#   damage_filter            mage|cleric|rogue|barbarian — if set, damage_all
#                            only hits heroes of that class
#   room_resist              null = normal, false = cannot be halved
#                            (blocks the Barbarian), true = cannot be reduced
#                            (blocks every hero reduction). Applies to this
#                            room's own damage lines (not poison, which is
#                            always unreducible).
#   discard_lead_damage      during the crawl the owner may discard a card to
#                            add this much to lead_damage for that crawl only
#                            (stacks per card; no level/bait gain)
#   discard_all_damage       same, but adds to damage_all
#   poison_damage            damage dealt to every hero this room damaged, in a
#                            later room (always unreducible)
#   poison_persists          false = lands once, in the very next room; true =
#                            lands in every later room
#   poison_ticks             how many times poison resolves AT this room
#                            (default 1; Maze = 3)
#   grows_on_death           true = each hero death here raises this room's
#                            level by 1 (so its increments scale up)
#   draw_on_death            true = the owner draws one room card AND one
#                            ability card per hero that dies here
#   room_aura                { match: {...}, amount: N } — +N damage to every
#                            OTHER room in the dungeon that matches the selector
#                            (selector dims: type / bait / tag)
#   tags                     classification tags (lowercased, optional)
#
# Copies in play scale with the player count (handled by the engine, not this
# file): an N-player game uses N copies of each basic room, with ceil(N/2) of
# those copies seeded into the build deck's DISCARD pile (they enter play only
# after a reshuffle) and the rest in the draw pile —
#   2 players → 2 copies, 1 in discard
#   3 players → 3 copies, 2 in discard
#   4 players → 4 copies, 2 in discard
# Advanced rooms scale the same way — N players → N copies each — but always
# start fully in the discard (no draw-pile copies). Each room's `copies` field
# below is the maximum pool (enough for 4 players).
#
# A room's level starts at 0. It rises by 1 when grows_on_death triggers, and
# by 1 (basic) / 2 (advanced) when a room card is spent to upgrade it during the
# Build phase. Each damage line = base + increment * level.

rooms:
  # --- Mundane rooms (basic, 3 damage) ---
  - id: room_goblins
    name: Goblins
    type: monster
    advanced: false
    bait: { glory: 1 }
    lead_damage: 3
    lead_damage_increment: 1
    tags: [goblin, monstrous_humanoid]
    copies: 4

  - id: room_fireball
    name: Fireball
    type: trap
    advanced: false
    bait: { arcane: 1 }
    lead_damage: 0
    lead_damage_increment: 0
    damage_all: 3
    damage_all_increment: 1
    tags: [arcane]
    copies: 4

  - id: room_skeletons
    name: Skeletons
    type: monster
    advanced: false
    bait: { undead: 1 }
    lead_damage: 3
    lead_damage_increment: 1
    tags: [undead]
    copies: 4

  - id: room_pit
    name: Pit
    type: trap
    advanced: false
    bait: { riches: 1 }
    lead_damage: 0
    lead_damage_increment: 0
    damage_all: 3
    damage_all_increment: 1
    draw_on_death: true
    copies: 4

  # --- Growth rooms (basic, 4 damage, +1 per level, grow on death) ---
  # Lower base (3) than the arcane/undead growers: glory has no bait reducer, so
  # this is only soft-countered (the Barbarian it lures halves it), unlike
  # Succubus/Zombies which their lured hero zeroes.
  - id: room_champion
    name: Hobgoblin Champion
    type: monster
    advanced: false
    bait: { glory: 1 }
    lead_damage: 3
    lead_damage_increment: 1
    grows_on_death: true
    tags: [hobgoblin, monstrous_humanoid]
    copies: 4

  - id: room_succubus
    name: Succubus
    type: monster
    advanced: false
    bait: { arcane: 1 }
    lead_damage: 4
    lead_damage_increment: 1
    grows_on_death: true
    copies: 4

  - id: room_zombies
    name: Zombies
    type: monster
    advanced: false
    bait: { undead: 1 }
    lead_damage: 4
    lead_damage_increment: 1
    grows_on_death: true
    tags: [undead]
    copies: 4

  # Lowest base (2) of the growers: riches lures the Rogue, who only reduces
  # traps, so this monster is completely uncounterable (full damage vs everyone,
  # including its own lure) — its low base pays for that reliability.
  - id: room_mimic
    name: Mimic
    type: monster
    advanced: false
    bait: { riches: 1 }
    lead_damage: 2
    lead_damage_increment: 1
    grows_on_death: true
    copies: 4

  # --- Draw rooms (basic, two bait icons, draw one of each card on death) ---
  - id: room_sacrifice_pit
    name: Sacrifice Pit
    type: trap
    advanced: false
    bait: { glory: 1, undead: 1 }
    lead_damage: 4
    lead_damage_increment: 1
    draw_on_death: true
    copies: 4

  - id: room_cursed_ring
    name: Cursed Ring
    type: trap
    advanced: false
    bait: { riches: 1, arcane: 1 }
    lead_damage: 2
    lead_damage_increment: 1
    room_resist: true
    poison_damage: 2
    poison_persists: true
    tags: [arcane]
    copies: 4

  - id: room_wyvern
    name: Wyvern
    type: monster
    advanced: false
    bait: { glory: 1, riches: 1 }
    lead_damage: 3
    lead_damage_increment: 1
    draw_on_death: true
    copies: 4

  - id: room_shade
    name: Shade
    type: monster
    advanced: false
    bait: { arcane: 1, undead: 1 }
    lead_damage: 4
    lead_damage_increment: 1
    draw_on_death: true
    tags: [undead]
    copies: 4

  # --- Trap rooms with crawl-time discard boost (basic) ---
  - id: room_undead_hands
    name: Undead Hands
    type: trap
    advanced: false
    bait: { undead: 1 }
    lead_damage: 0
    lead_damage_increment: 0
    damage_all: 1
    damage_all_increment: 1
    discard_all_damage: 2
    tags: [undead]
    copies: 4

  - id: room_power_word
    name: Power Word
    type: trap
    advanced: false
    bait: { arcane: 1 }
    lead_damage: 0
    lead_damage_increment: 0
    damage_all: 1
    damage_all_increment: 1
    discard_all_damage: 2
    tags: [arcane]
    copies: 4

  # --- Poison / delayed traps (now basic) ---
  - id: room_floor_spike
    name: Floor Spike
    type: trap
    advanced: false
    bait: { riches: 1 }
    lead_damage: 2
    lead_damage_increment: 1
    poison_damage: 8
    poison_persists: false
    copies: 4

  - id: room_poison_gas
    name: Poison Gas
    type: trap
    advanced: false
    bait: { glory: 1 }
    lead_damage: 0
    lead_damage_increment: 0
    damage_all: 2
    damage_all_increment: 1
    poison_damage: 1
    poison_persists: true
    copies: 4

advanced_rooms:
  # --- Anti-class traps (unreducible damage to one class) ---
  - id: adv_antimagic_room
    name: Antimagic Room
    type: trap
    advanced: true
    bait: { arcane: 2 }
    lead_damage: 0
    lead_damage_increment: 0
    damage_all: 4
    damage_all_increment: 1
    damage_filter: mage
    room_resist: true
    tags: [arcane]
    copies: 4

  - id: adv_zealots
    name: Zealots
    type: monster
    advanced: true
    bait: { undead: 2 }
    lead_damage: 0
    lead_damage_increment: 0
    damage_all: 4
    damage_all_increment: 1
    damage_filter: cleric
    room_resist: true
    tags: [undead]
    copies: 4

  - id: adv_false_trigger
    name: False Trigger
    type: trap
    advanced: true
    bait: { riches: 2 }
    lead_damage: 0
    lead_damage_increment: 0
    damage_all: 4
    damage_all_increment: 1
    damage_filter: rogue
    room_resist: true
    copies: 4

  # --- Unreducible / unhalvable growth bruisers ---
  - id: adv_gladiator
    name: Gladiator
    type: monster
    advanced: true
    bait: { glory: 1 }
    lead_damage: 4
    lead_damage_increment: 2
    grows_on_death: true
    room_resist: true
    tags: [monstrous_humanoid]
    copies: 4

  - id: adv_troll
    name: Troll
    type: monster
    advanced: true
    bait: { glory: 1 }
    lead_damage: 10
    lead_damage_increment: 4
    grows_on_death: true
    tags: [monstrous_humanoid]
    copies: 4

  # Shadow: a fast grower that strikes the weakest hero first (rear, cascading
  # upward) and can't be halved — the Barbarian's self-halve does nothing to it
  # (but hero reductions still apply). Every kill raises its level by 1, and with
  # +2 rear per level it snowballs quickly, picking off the frail.
  - id: adv_shadow
    name: Shadow
    type: monster
    advanced: true
    bait: { undead: 1 }
    lead_damage: 0
    lead_damage_increment: 0
    damage_rear: 6
    damage_rear_increment: 2
    grows_on_death: true
    room_resist: false
    tags: [undead]
    copies: 4

  # Wright: a drainer — raises reinforcements. It draws a room + ability card per
  # hero that dies here (card advantage) instead of snowballing its own level.
  - id: adv_wright
    name: Wright
    type: monster
    advanced: true
    bait: { undead: 1 }
    lead_damage: 6
    lead_damage_increment: 1
    draw_on_death: true
    tags: [undead]
    copies: 4

  # --- Mirror: reflects the party's toughest hero — deals damage equal to the
  #     highest max HP in the party as an unreducible lead hit (cascades). ---
  - id: adv_mirror
    name: Mirror
    type: trap
    advanced: true
    bait: { glory: 1, arcane: 1 }
    lead_damage: 0
    lead_damage_increment: 0
    lead_max_party_hp: true
    room_resist: true
    copies: 4

  # --- Black Tentacles: chip everyone, smash the most injured ---
  - id: adv_black_tentacles
    name: Black Tentacles
    type: trap
    advanced: true
    bait: { arcane: 1 }
    lead_damage: 0
    lead_damage_increment: 0
    damage_all: 1
    damage_all_increment: 1
    damage_rear: 5
    damage_rear_increment: 1
    tags: [arcane]
    copies: 4

  # --- Maze: poison resolves 3x here (helps when a poison trap precedes it) ---
  - id: adv_maze
    name: Maze
    type: trap
    advanced: true
    bait: { arcane: 1 }
    lead_damage: 0
    lead_damage_increment: 0
    damage_all: 4
    damage_all_increment: 1
    poison_ticks: 3
    tags: [arcane]
    copies: 4

  # --- Aura rooms (re-added): buff other traps / creatures ---
  - id: adv_trap_makers_workshop
    name: Trap Makers Workshop
    type: trap
    advanced: true
    bait: { riches: 1 }
    lead_damage: 2
    lead_damage_increment: 1
    room_aura:
      match: { type: trap }
      amount: 2
    copies: 4

  - id: adv_beast_tamer
    name: Hobgoblin Beastmaster
    type: monster
    advanced: true
    bait: { glory: 1 }
    lead_damage: 2
    lead_damage_increment: 1
    room_aura:
      match: { type: creature }
      amount: 2
    tags: [hobgoblin, monstrous_humanoid]
    copies: 4
