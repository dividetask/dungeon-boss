# ===== heroes (from data/cards/heroes.yaml) =====
# Data-driven heroes (see docs/cards.md). Level starts at floor(round/4), +1 per
# survived crawl. maxHP = starting_hp + floor(level*hp_level_increment);
# courage = 1 + level; party reduce = party_damage_reduction + floor(level*increment).
heroes:
  - id: hero_barbarian
    name: Barbarian
    icon: "🪓"
    preferred_bait: glory
    starting_hp: 8
    hp_level_increment: 2
    self_damage_multiplier: 0.5
    party_damage_reduction: 0
    party_damage_reduction_level_increment: 0
    damage_bait_filter: null
    damage_room_type_filter: null
    copies: 12

  - id: hero_rogue
    name: Rogue
    icon: "🗡️"
    preferred_bait: riches
    starting_hp: 6
    hp_level_increment: 1
    self_damage_multiplier: 1
    party_damage_reduction: 2
    party_damage_reduction_level_increment: 1
    damage_bait_filter: null
    damage_room_type_filter: trap
    copies: 12

  - id: hero_cleric
    name: Cleric
    icon: "✝️"
    preferred_bait: undead
    starting_hp: 5
    hp_level_increment: 0.75
    self_damage_multiplier: 1
    party_damage_reduction: 4
    party_damage_reduction_level_increment: 1
    damage_bait_filter: undead
    damage_room_type_filter: null
    copies: 12

  - id: hero_mage
    name: Mage
    icon: "🔮"
    preferred_bait: arcane
    starting_hp: 4
    hp_level_increment: 0.05
    self_damage_multiplier: 1
    party_damage_reduction: 4
    party_damage_reduction_level_increment: 2
    damage_bait_filter: arcane
    damage_room_type_filter: null
    copies: 12

# ===== ability_cards (from data/cards/abilities.yaml) =====

ability_cards:
  - id: ability_extra_damage
    name: Reinforcements
    effect:
      add_damage: 4
    text: "Target room deals 4 additional damage"
    copies: 8

  - id: ability_full_damage
    name: Expose Weakness
    effect:
      unreducible: true
    text: "Target room deals full damage (no damage reduction)"
    copies: 8

  - id: ability_no_damage
    name: Sabotage
    effect:
      zero: true
    text: "Target room deals no damage"
    copies: 8

  - id: ability_return_to_town
    name: Retreat
    effect:
      retreat: true
    text: "Target a room: the party turns back after reaching there"
    copies: 8

  - id: ability_draw_rooms
    name: Blueprints
    effect:
      draw_rooms: 2
    text: "Draw 2 room cards"
    copies: 8
