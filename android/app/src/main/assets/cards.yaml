# Advanced rooms share the build deck but may only be played by REPLACING an
# existing room whose bait icons cover the advanced room's own bait. Their
# `effect` drives special behaviour during the crawl. About as common as
# upgrades (4 basic rooms : 1 upgrade : 1 advanced room).

advanced_rooms:
  - id: adv_poison_gas
    name: Poison Gas
    type: Trap
    damage: 2
    bait:
      riches: 1
    effect:
      damages_all: true
      poisons_on_hit: true
    description: "Deals 2 damage to every hero (reduced as usual); each damaged hero takes 1 more in every later room"
    copies: 11

  - id: adv_antimagic_room
    name: Antimagic Room
    type: Trap
    damage: 0
    bait:
      arcane: 2
    effect:
      party_hits:
        - match: { preferred_bait: arcane }
          amount: 4
    description: "All Mages in the party take 4 damage that cannot be reduced"
    copies: 11

  - id: adv_zealots
    name: Zealots
    type: Creature
    damage: 4
    bait:
      undead: 2
    effect:
      party_hits:
        - match: { preferred_bait: undead }
          amount: 4
    description: "All Clerics in the party take 4 damage that cannot be reduced"
    copies: 11

  - id: adv_trap_makers_workshop
    name: Trap Makers Workshop
    type: Creature
    damage: 2
    bait:
      riches: 2
    effect:
      room_auras:
        - match: { type: trap }
          flat: 2
    description: "All other trap rooms deal +2 damage"
    copies: 11

  - id: adv_beast_tamer
    name: Beast Tamer
    type: Creature
    damage: 2
    bait:
      glory: 2
    effect:
      room_auras:
        - match: { type: creature }
          flat: 2
    description: "All other creature rooms deal +2 damage"
    copies: 11

  - id: adv_collapsing_tunnel
    name: Collapsing Tunnel
    type: Trap
    damage: 2
    bait:
      riches: 1
    effect:
      discard_boost: { add_damage: 4 }
    description: "Discard a room card to increase this room's damage by 4"
    copies: 5

  - id: adv_golem
    name: Golem
    type: Trap
    damage: 2
    bait:
      arcane: 1
    effect:
      discard_boost: { add_damage: 4 }
    description: "Discard a room card to increase this room's damage by 4"
    copies: 5

  - id: adv_necrotic_fog
