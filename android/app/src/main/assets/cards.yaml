# Dungeon Boss — canonical card definitions for the Android client.
#
# This is the Android copy of the cards. The canonical source is the split set
# of files under data/cards/ (bosses.yaml, rooms.yaml, heroes.yaml,
# abilities.yaml); this file merges their top-level keys into one document that
# the Android CardLibrary loads from assets. Keep it in sync with data/cards/.
# See docs/cards.md for the schema. Bait types: glory, riches, undead, arcane.
#
# Rooms use the flat field schema (v2): lead/all/rear damage with per-level
# increments, room_resist (null/false/true), damage_filter, unified poison, and
# the level-driven growth/upgrade model. There are no Upgrade cards. Advanced
# rooms seed the discard pile (the engine does this), so they cannot appear in an
# opening hand.

# ===== bosses (from data/cards/bosses.yaml) =====
bosses:
  - id: boss_lich
    name: Lich
    lead_damage: 4
    bait:
      undead: 1
      arcane: 1
    effect:
      room_bonuses:
        - match: { type: trap, tag: arcane }
          per_point: 1
    ability_text: "Arcane Trap rooms deal +1 damage per point."

  - id: boss_oni
    name: Oni
    lead_damage: 8
    bait:
      glory: 1
      arcane: 1
    effect:
      room_bonuses:
        - match: { tag: monstrous_humanoid }
          flat: 4
    tags: [monstrous_humanoid]
    ability_text: "All Monstrous Humanoid rooms deal +4 damage."

  - id: boss_vampire
    name: Vampire
    lead_damage: 4
    bait:
      undead: 1
      riches: 1
    effect:
      self_damage_per_point: 2
    ability_text: "Deals an additional 2 damage per point, rather than 1."

  - id: boss_medusa
    name: Medusa
    lead_damage: 6
    bait:
      glory: 1
      arcane: 1
    effect:
      unreducible: true
    ability_text: "Medusa's petrifying gaze cannot be reduced — her damage ignores every hero and party reduction."

  - id: boss_goblin_chieftain
    name: Goblin Chieftain
    lead_damage: 4
    bait:
      glory: 1
      riches: 1
    effect:
      room_bonuses:
        - match: { tag: goblin }
          per_point: 1
        - match: { tag: hobgoblin }
          per_point: 1
    tags: [goblin]
    ability_text: "Goblin and Hobgoblin rooms deal +1 damage per point."

  - id: boss_malevolent_spirit
    name: Malevolent Spirit
    lead_damage: 2
    bait:
      undead: 1
      arcane: 1
      glory: 1
    effect:
      self_damage_per_point: 3
    ability_text: "Deals an additional 3 damage per point, rather than 1."

  - id: boss_kobold_chieftain
    name: Kobold Chieftain
    lead_damage: 5
    bait:
      riches: 1
      glory: 1
    effect:
      room_bonuses:
        - match: { type: trap }
          flat: 2
    ability_text: "All trap rooms in this dungeon deal an additional 2 damage."

  - id: boss_necromancer
    name: Necromancer
    lead_damage: 4
    bait:
      undead: 1
      arcane: 1
    effect:
      room_bonuses:
        - match: { type: creature, tag: undead }
          flat: 2
          per_point: 1
    ability_text: "Undead creatures deal +2 damage, plus +1 more per point scored."


