# Dungeon Boss — AI heuristics for the LogicAgent (see docs/ai.md).
#
# This file is *data*, not code: it tunes how the computer opponent decides,
# without touching client code. It mirrors the project's pattern where card
# `effect`s / fields are declarative data interpreted by the clients. Here,
# LogicAgent is the interpreter.
#
# One key per decision the game asks an agent to make (Decision kinds):
#   choose_boss        pick one of two drawn bosses
#   place_first_room   Setup: place a room beside the boss
#   discard_rooms      Build: throw a room from hand away (drawing more)
#   build_room         Build: place/replace a room, upgrade a placed room with a
#                      room card, or build nothing
#
# Each value is an ordered list of `prefer:` rules forming a TIE-BREAK CHAIN:
# the first rule scores every candidate and keeps only the best; surviving ties
# pass to the next rule; any ties left after the last rule are broken at random.
#
# Comparators a `prefer:` rule understands
#   highest_damage     most headline damage (the card's primary channel; the boss)
#   lowest_damage      least headline damage (used to throw away the weakest room)
#   bait_count         most total bait icons on the card (more luring)
#   [glory, riches, ...]  a bait-priority list: prefer the card with the most
#                      icons of the first-listed bait, breaking ties by the next,
#                      and so on. Bait names are exactly glory/riches/undead/arcane.
#   most_points        SIMULATION: run the current town heroes through the dungeon
#                      this move would produce and prefer the most hero deaths
#                      (each death scores the owner a point).
#   fewest_wounds      SIMULATION: prefer the fewest surviving parties. The owner
#                      takes one wound per party that survives, so "fewest wounds"
#                      is the damage the owner avoids.
#   highest_avg_damage SIMULATION: prefer the most average post-reduction damage
#                      dealt to the current town heroes (hero damage reduction is
#                      taken into account). A smooth tie-breaker when no extra
#                      heroes die: it favours the placement that hurts heroes most.
#
# Simulation comparators only bite when there is a dungeon to crawl and heroes in
# town (i.e. build_room mid-game). At Setup the town is empty, so choose_boss and
# place_first_room rely on the static comparators above.

choose_boss:
  - prefer: highest_damage                   # a deadlier boss kills more heroes
  - prefer: [glory, riches, arcane, undead]  # then the boss whose bait we prefer
  - prefer: bait_count                       # then the boss that lures the hardest

place_first_room:
  - prefer: highest_damage                   # open with the strongest room
  - prefer: [glory, riches, arcane, undead]  # tie-break on bait preference

discard_rooms:
  - prefer: lowest_damage                    # keep the strong rooms, ditch the weak

build_room:
  - prefer: most_points                      # play to kill the most heroes in town
  - prefer: fewest_wounds                    # then to let the fewest survive
  - prefer: highest_avg_damage               # then to hurt the heroes the most
  - prefer: highest_damage                   # last resort (e.g. empty town): raw power

# ---------------------------------------------------------------------------
# Ability cards (the pre-crawl window). These are NOT tie-break chains like the
# decision keys above: an ability is judged on its own. Just before a party
# crawls, each automated player forecasts the pending crawl (a dry-run, so
# nothing is mutated) WITH and WITHOUT each card it holds, and spends the card
# only when one of the objectives listed for it clears its threshold. The AI
# never plays a card in a direction that would help the dungeon it is crawling
# against, and never wastes one for too small a gain.
#
# Who plays what falls out of the objectives a card lists:
#   prevent_self_wound: true    the crawl OWNER plays it to stop a hero surviving
#                               its own dungeon (a survivor costs the owner a
#                               wound). Buffs — Bolster (+damage), Counter (no
#                               reduction) — do this.
#   wound_winning_opponent: true  an OPPONENT plays it to make a hero survive the
#                               owner's dungeon, handing that owner a wound — but
#                               only when the owner is "winning" (points at or
#                               above winning_opponent_points), so disruption is
#                               spent on real threats, not everyone.
#   deny_opponent_points: N     an OPPONENT plays it when it stops the owner
#                               scoring at least N points (N fewer hero deaths).
#                               e.g. Retreat at 3 fires when it saves 3+ points,
#                               but not when it would only save 2.
#   refill_room_hand_below: N   a no-target utility card (Blueprints) the player
#                               plays whenever its room hand holds fewer than N.
#
# Opponents act first (disruption), then the owner has the last word (buffs).
ai_abilities:
  # An opponent counts as "winning" — worth spending a wound-dealing card on —
  # once their points reach this.
  winning_opponent_points: 5
  cards:
    ability_extra_damage:        # Bolster (+4 damage to a room)
      prevent_self_wound: true
    ability_full_damage:         # Counter (a room's damage cannot be reduced)
      prevent_self_wound: true
    ability_no_damage:           # Sabotage (a room deals 0)
      wound_winning_opponent: true
      deny_opponent_points: 2
    ability_return_to_town:      # Retreat (the party turns back at a room)
      deny_opponent_points: 3
    ability_draw_rooms:          # Blueprints (draw 2 room cards)
      refill_room_hand_below: 3
